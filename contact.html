<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact — Hamraj Shaikh</title>

<link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
  rel="stylesheet"
/>

<style>
body{
  background: #080d1b;
  color: #dfe6ff;        /* brighter text */
}

/* Card theme */
.card-dark{
  background: linear-gradient(145deg, #0b1433, #060b1f);
  border: 1px solid rgba(77,210,255,.35);
  box-shadow: 0 0 25px rgba(77,210,255,.12);
  border-radius: 14px;
}

/* Headings */
h2, h3, h4{
  color: #ffffff;
}

/* List items */
.list-group-item{
  background: transparent;
  color: #e6ebff;
  border-color: rgba(77,210,255,.25);
}

/* Paragraph text */
p{
  color: #cfd7ff;
}

/* Links */
a{
  color: #7fe9ff;
}

a:hover{
  color: #4dd2ff;
}

/* Form controls */
.form-control{
  background: #0c1439;
  border: 1px solid #29418c;
  color: #ffffff;
}

.form-control::placeholder{
  color: #aeb7e9;
}

.form-control:focus{
  background: #0f1b55;
  border-color: #4dd2ff;
  box-shadow: 0 0 18px rgba(77,210,255,.4);
}

/* Buttons */
.btn-primary,
.btn-success{
  background: linear-gradient(145deg, #4dd2ff, #2db2e6);
  border: none;
  color: #021019;
  font-weight: 700;
}

.btn-primary:hover,
.btn-success:hover{
  opacity: .9;
}

#msg{
  font-size: 14px;
  color: #9fe8ff;
}

/* Section spacing */
.section{
  padding-top: 40px;
}

</style>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@2/dist/email.min.js"></script>

<script>
  (function () {
    emailjs.init("YOUR_PUBLIC_KEY");
  })();
</script>

</head>

<body>

<div class="container py-4">

  <h2 class="text-center mb-4">Contact Me</h2>

  <div class="row g-4">

    <!-- LEFT SIDE -->
    <div class="col-lg-5">
      <div class="card card-dark">
        <div class="card-body">

          <h4 class="mb-3">Get in Touch</h4>

          <ul class="list-group list-group-flush mb-3">
            <li class="list-group-item">
              <strong>Name:</strong> Hamraj Shaikh
            </li>

            <li class="list-group-item">
              <strong>Email:</strong>
              <a href="mailto:hamrajshaikh02@gmail.com">
                hamrajshaikh02@gmail.com
              </a>
            </li>

            <li class="list-group-item">
              <strong>Phone:</strong> +91 9689255216
            </li>

            <li class="list-group-item">
              <strong>Location:</strong> Ahemdnagar Maharashtra, India
            </li>
          </ul>

          <p>
            I’m available for internships, freelance & full-time opportunities.<br>
            If any Query Message Me! 
          </p>

          <a href="mailto:hamrajshaikh02@gmail.com" class="btn btn-primary">
            Contact Me
          </a>

        </div>
      </div>
    </div>

    <!-- RIGHT SIDE FORM -->
    <div class="col-lg-7">
      <div class="card card-dark">
        <div class="card-body">

          <h4 class="mb-3">Send Me a Message</h4>

          <form id="contactForm">

            <div class="mb-3">
              <label class="form-label text-white">Your Name</label>
              <input type="text" name="name" class="form-control" required />
            </div>

            <div class="mb-3">
              <label class="form-label text-white">Your Email</label>
              <input type="email" name="email" class="form-control" required />
            </div>

            <div class="mb-3">
              <label class="form-label text-white">Company / Organization</label>
              <input type="text" name="company" class="form-control" required />
            </div>

            <div class="mb-3">
              <label class="form-label text-white">Message</label>
              <textarea name="message" rows="4" class="form-control" required></textarea>
            </div>

            <button class="btn btn-success" type="submit">
              Send Message
            </button>

            <p id="msg" class="mt-2"></p>

          </form>

        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const form = document.getElementById("contactForm");
  const msg = document.getElementById("msg");

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    emailjs
      .send(
        "YOUR_SERVICE_ID",
        "YOUR_TEMPLATE_ID",
        {
          name: form.name.value,
          email: form.email.value,
          company: form.company.value,
          message: form.message.value,
        }
      )
      .then(() => {
        msg.innerHTML =
          '<span class="text-success">Message sent successfully! I will contact you soon.</span>';
        form.reset();
      })
      .catch(() => {
        msg.innerHTML =
          '<span class="text-danger">Something went wrong. Please try again.</span>';
      });
  });
</script>

</body>
</html>
